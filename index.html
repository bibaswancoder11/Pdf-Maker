        Share: ({ className }) => (

            <path strokeLinecap="round" strokeLinejoin="round" d="M7.217 10.907a2.25 2.25 0 100 2.186m0-2.186l5.572 3.285m-5.572-3.285L12.79 6.942m0 10.116a2.25 2.25 0 103.481-2.186m0 0L10.707 11.5m5.564-4.558a2.25 2.25 0 10-3.481-2.186m0 0L10.707 7.62" />

      };

      // Synchronous local utility to convert base64 data URLs directly to ArrayBuffers.
      // This is crucial for offline/standalone runtimes like HopWeb where fetch("data:...") fails or is blocked.
      const dataURLToArrayBuffer = (dataUrl) => {
        const parts = dataUrl.split(',');
        const base64 = parts[1];
        const raw = window.atob(base64);
        const rawLength = raw.length;
        const array = new Uint8Array(new ArrayBuffer(rawLength));
        for (let i = 0; i < rawLength; i++) {
          array[i] = raw.charCodeAt(i);
        }
        return array.buffer;
      };

      // 100% Client-Side PDF Renderer utilizing PDF.js Canvas drawing.
      // This solves iframe rendering blocks in Android WebViews (like HopWeb) and runs 100% offline.
      const PdfViewer = ({ blob }) => {
        const [numPages, setNumPages] = React.useState(0);
        const [currentPage, setCurrentPage] = React.useState(1);
        const [loading, setLoading] = React.useState(false);
        const [pdfDoc, setPdfDoc] = React.useState(null);
        const canvasRef = React.useRef(null);

        React.useEffect(() => {
          if (!blob) return;
          setLoading(true);
          let isMounted = true;

          const loadPdf = async () => {
            try {
              const arrayBuffer = await blob.arrayBuffer();
              const pdfjsLib = window['pdfjs-dist/build/pdf'];
              pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
              
              const loadingTask = pdfjsLib.getDocument({ data: new Uint8Array(arrayBuffer) });
              const pdf = await loadingTask.promise;
              if (isMounted) {
                setPdfDoc(pdf);
                setNumPages(pdf.numPages);
                setCurrentPage(1);
                await renderPage(pdf, 1);
              }
            } catch (err) {
              console.error('Error rendering PDF with pdf.js:', err);
            } finally {
              if (isMounted) setLoading(false);
            }
          };

          loadPdf();
          return () => { isMounted = false; };
        }, [blob]);

        const renderPage = async (pdf, pageNumber) => {
          try {
            const page = await pdf.getPage(pageNumber);
            const canvas = canvasRef.current;
            if (!canvas) return;
            const context = canvas.getContext('2d');
            
            const dpr = window.devicePixelRatio || 1;
            const containerWidth = canvas.parentElement.clientWidth || 350;
            const unscaledViewport = page.getViewport({ scale: 1 });
            const scale = (containerWidth / unscaledViewport.width) * 0.96;
            const viewport = page.getViewport({ scale: scale * dpr });
            
            canvas.width = viewport.width;
            canvas.height = viewport.height;
            canvas.style.width = `${viewport.width / dpr}px`;
            canvas.style.height = `${viewport.height / dpr}px`;
            
            const renderContext = {
              canvasContext: context,
              viewport: viewport
            };
            
            await page.render(renderContext).promise;
          } catch (err) {
            console.error('Page render error:', err);
          }
        };

        React.useEffect(() => {
          if (pdfDoc) {
            renderPage(pdfDoc, currentPage);
          }
        }, [currentPage, pdfDoc]);

        React.useEffect(() => {
          const handleResize = () => {
            if (pdfDoc) {
              renderPage(pdfDoc, currentPage);
            }
          };
          window.addEventListener('resize', handleResize);
          return () => window.removeEventListener('resize', handleResize);
        }, [pdfDoc, currentPage]);

        if (!blob) return null;

        return (
          <div className="flex flex-col items-center space-y-3 bg-neutral-100/50 p-4 rounded-xl border border-neutral-200">
            {loading ? (
              <div className="flex flex-col items-center justify-center h-[350px] text-neutral-500 font-medium">
                <Icons.RefreshCw className="w-8 h-8 animate-spin text-indigo-600 mb-2" />
                <span>Generating high-fidelity canvas view...</span>
              </div>
            ) : (
              <>
                <div className="w-full overflow-hidden flex justify-center bg-white rounded-lg shadow-sm border border-neutral-200 p-1">
                  <canvas ref={canvasRef} className="max-w-full block" />
                </div>
                {numPages > 1 && (
                  <div className="flex items-center justify-between w-full px-1 pt-1">
                    <button
                      type="button"
                      onClick={() => setCurrentPage(prev => Math.max(prev - 1, 1))}
                      disabled={currentPage === 1}
                      className="px-2.5 py-1.5 bg-white hover:bg-neutral-50 border border-neutral-300 rounded-lg text-xs font-semibold text-neutral-700 disabled:opacity-40 disabled:cursor-not-allowed transition-all"
                    >
                      ← Prev
                    </button>
                    <span className="text-xs text-neutral-500 font-semibold font-mono">
                      Page {currentPage} / {numPages}
                    </span>
                    <button
                      type="button"
                      onClick={() => setCurrentPage(prev => Math.min(prev + 1, numPages))}
                      disabled={currentPage === numPages}
                      className="px-2.5 py-1.5 bg-white hover:bg-neutral-50 border border-neutral-300 rounded-lg text-xs font-semibold text-neutral-700 disabled:opacity-40 disabled:cursor-not-allowed transition-all"
                    >
                      Next →
                    </button>
                  </div>
                )}
              </>
            )}
          </div>
        );
      };

      function App() {
        const [activeTab, setActiveTab] = useState('images');
        const [isServerAvailable, setIsServerAvailable] = useState(false);

        // Check if server endpoints are operational (for stand-alone runners like HopWeb)
        useEffect(() => {
          fetch('/api/health')
            .then(res => res.json())
            .then(data => {
              if (data && data.status === 'ok') {
                setIsServerAvailable(true);
              }
            })
            .catch(() => {
              setIsServerAvailable(false);
              console.log('Running in local standalone/static client mode (e.g. HopWeb). Standard qpdf features will run in client compatibility fallback.');
            });
        }, []);

        // --- PDF Preview States ---
        const [previewUrl, setPreviewUrl] = useState('');
        const [previewFilename, setPreviewFilename] = useState('');
        const [previewBlob, setPreviewBlob] = useState(null);
        const previewRef = useRef(null);

        // Helper to update preview state safely and scroll to it
        const updatePreview = async (blob, filename) => {
          setPreviewFilename(filename);
          setPreviewBlob(blob);

          if (isServerAvailable) {
            try {
              // Try to upload the preview file to the server first
              const formData = new FormData();
              formData.append('pdf', blob, filename);

              const response = await fetch('/api/upload-preview', {
                method: 'POST',
                body: formData,
              });

              if (response.ok) {
                const data = await response.json();
                // Server-side path bypassing sandbox constraints on nested iframe blob: URLs
                const url = `/api/preview/${data.previewId}`;
                setPreviewUrl(url);
                return;
              }
            } catch (err) {
              console.warn('Falling back to local Blob URL for PDF preview:', err);
            }
          }

          // Fallback to local Blob URL if offline or server preview is not available
          const url = URL.createObjectURL(blob);
          setPreviewUrl(url);
          
          // Smooth scroll to the preview section
          setTimeout(() => {
            if (previewRef.current) {
              previewRef.current.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
          }, 100);
        };

        const clearPreview = () => {
          if (previewUrl && previewUrl.startsWith('blob:')) {
            URL.revokeObjectURL(previewUrl);
          }
          setPreviewUrl('');
          setPreviewFilename('');
          setPreviewBlob(null);
        };

        // Clean up preview URL on unmount
        useEffect(() => {
          return () => {
            if (previewUrl && previewUrl.startsWith('blob:')) {
              URL.revokeObjectURL(previewUrl);
            }
          };
        }, [previewUrl]);

        // Clean up on tab change
        useEffect(() => {
          clearPreview();
        }, [activeTab]);

        // --- Image to PDF States ---
        const [imageFiles, setImageFiles] = useState([]);
        const [imageLayout, setImageLayout] = useState('fit');
        const [imageCropRatio, setImageCropRatio] = useState('none');
        const [imagePassword, setImagePassword] = useState('');
        const [isImagesLoading, setIsImagesLoading] = useState(false);
        const [imagesError, setImagesError] = useState('');
        const [imagesSuccess, setImagesSuccess] = useState(false);

        // Clean up preview URLs to avoid memory leaks
        useEffect(() => {
          return () => {
            imageFiles.forEach(file => {
              if (file.previewUrl) {
                URL.revokeObjectURL(file.previewUrl);
              }
            });
          };
        }, [imageFiles]);

        // --- Document to PDF States ---
        const [docFile, setDocFile] = useState(null);
        const [docTitle, setDocTitle] = useState('');
        const [docPassword, setDocPassword] = useState('');
        const [isDocLoading, setIsDocLoading] = useState(false);
        const [docError, setDocError] = useState('');
        const [docSuccess, setDocSuccess] = useState(false);

        // --- Write Text to PDF States ---
        const [writeText, setWriteText] = useState('');
        const [writeTitle, setWriteTitle] = useState('');
        const [writePageSize, setWritePageSize] = useState('A4');
        const [writeFontSize, setWriteFontSize] = useState('11');
        const [writePassword, setWritePassword] = useState('');
        const [isWriteLoading, setIsWriteLoading] = useState(false);
        const [writeError, setWriteError] = useState('');
        const [writeSuccess, setWriteSuccess] = useState(false);

        // --- PDF Password Manager States ---
        const [secFile, setSecFile] = useState(null);
        const [secAction, setSecAction] = useState('add');
        const [secPassword, setSecPassword] = useState('');
        const [secNewPassword, setSecNewPassword] = useState('');
        const [isSecLoading, setIsSecLoading] = useState(false);
        const [secError, setSecError] = useState('');
        const [secSuccess, setSecSuccess] = useState(false);

        // --- Drag and Drop Handlers ---
        const [isDragOver, setIsDragOver] = useState(false);

        const handleDragOver = (e) => {
          e.preventDefault();
          setIsDragOver(true);
        };

        const handleDragLeave = () => {
          setIsDragOver(false);
        };

        const processAndAddFiles = async (files) => {
          const processed = [];
          for (const file of files) {
            try {
              const arrayBuffer = await file.arrayBuffer();
              const previewUrl = URL.createObjectURL(file);
              processed.push({
                name: file.name,
                size: file.size,
                type: file.type,
                arrayBuffer,
                previewUrl
              });
            } catch (err) {
              console.error('Error pre-reading image file:', err);
              setImagesError(`Could not read file ${file.name}.`);
            }
          }
          setImageFiles((prev) => [...prev, ...processed]);
        };

        const processAndSetDocFile = async (file) => {
          try {
            const fileType = file.name.split('.').pop().toLowerCase();
            let textContent = '';
            let arrayBuffer = null;

            if (fileType === 'docx') {
              arrayBuffer = await file.arrayBuffer();
            } else if (['txt', 'md', 'csv', 'html', 'json'].includes(fileType)) {
              textContent = await new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => resolve(e.target.result);
                reader.onerror = reject;
                reader.readAsText(file);
              });
            }

            setDocFile({
              name: file.name,
              size: file.size,
              type: file.type,
              textContent,
              arrayBuffer
            });
            setDocTitle(file.name.substring(0, file.name.lastIndexOf('.')));
            setDocError('');
          } catch (err) {
            console.error('Error pre-reading document:', err);
            setDocError(`Could not read file ${file.name}.`);
          }
        };

        const processAndSetSecFile = async (file) => {
          try {
            const arrayBuffer = await file.arrayBuffer();
            setSecFile({
              name: file.name,
              size: file.size,
              type: file.type,
              arrayBuffer
            });
            setSecError('');
          } catch (err) {
            console.error('Error pre-reading security PDF:', err);
            setSecError(`Could not read file ${file.name}.`);
          }
        };

        const handleImageDrop = async (e) => {
          e.preventDefault();
          setIsDragOver(false);
          const files = Array.from(e.dataTransfer.files);
          const imageExtensions = ['.png', '.jpg', '.jpeg', '.webp', '.gif', '.svg', '.bmp', '.tiff'];
          const validImages = files.filter((file) =>
            imageExtensions.some((ext) => file.name.toLowerCase().endsWith(ext))
          );
          if (validImages.length > 0) {
            await processAndAddFiles(validImages);
            setImagesError('');
          } else {
            setImagesError('Please drop valid image files (PNG, JPG, WebP, BMP, TIFF, GIF, SVG).');
          }
        };

        const handleDocDrop = async (e) => {
          e.preventDefault();
          setIsDragOver(false);
          const file = e.dataTransfer.files[0];
          if (file) {
            const docExtensions = ['.txt', '.md', '.docx', '.csv'];
            const isValid = docExtensions.some((ext) => file.name.toLowerCase().endsWith(ext));
            if (isValid) {
              await processAndSetDocFile(file);
            } else {
              setDocError('Unsupported file type. Please upload a .txt, .md, .csv or .docx file.');
            }
          }
        };

        const handleSecDrop = async (e) => {
          e.preventDefault();
          setIsDragOver(false);
          const file = e.dataTransfer.files[0];
          if (file && file.name.toLowerCase().endsWith('.pdf')) {
            await processAndSetSecFile(file);
          } else {
            setSecError('Please drop a valid PDF file.');
          }
        };

        // --- File Input Handlers ---
        const handleImageSelect = async (e) => {
          if (e.target.files) {
            await processAndAddFiles(Array.from(e.target.files));
            setImagesError('');
          }
        };

        const handleDocSelect = async (e) => {
          if (e.target.files && e.target.files[0]) {
            await processAndSetDocFile(e.target.files[0]);
          }
        };

        const handleSecSelect = async (e) => {
          if (e.target.files && e.target.files[0]) {
            await processAndSetSecFile(e.target.files[0]);
          }
        };

        // Reorder images helper
        const moveImage = (index, direction) => {
          if (direction === 'up' && index === 0) return;
          if (direction === 'down' && index === imageFiles.length - 1) return;
          const targetIndex = direction === 'up' ? index - 1 : index + 1;
          const updated = [...imageFiles];
          const temp = updated[index];
          updated[index] = updated[targetIndex];
          updated[targetIndex] = temp;
          setImageFiles(updated);
        };

        // Helper to download Blob securely (handles fallback to url if blob is missing, making it 100% crash-safe)
        const downloadBlob = async (blob, filename) => {
          try {
            let url;
            let shouldRevoke = false;
            if (blob) {
              url = window.URL.createObjectURL(blob);
              shouldRevoke = true;
            } else if (previewUrl) {
              url = previewUrl;
            } else {
              alert("No PDF content is ready for download.");
              return;
            }
            const a = document.createElement('a');
            a.href = url;
            a.download = filename || 'document.pdf';
            document.body.appendChild(a);
            a.click();
            a.remove();
            if (shouldRevoke) {
              window.URL.revokeObjectURL(url);
            }
          } catch (err) {
            console.error('Download failed:', err);
            alert("Download failed. Please try 'Open in New Tab' to save or print.");
          }
        };

        // --- Client-Side Submission Handlers ---
        const handleImagesSubmit = async () => {
          if (imageFiles.length === 0) {
            setImagesError('Please select or upload at least one image.');
            return;
          }
          setIsImagesLoading(true);
          setImagesError('');
          setImagesSuccess(false);

          try {
            if (!window.PDFLib) {
              throw new Error('PDF library is not loaded yet. Please wait a moment and try again.');
            }

            const { PDFDocument } = window.PDFLib;
            const pdfDoc = await PDFDocument.create();

            for (const file of imageFiles) {
              let pdfImage;
              const arrayBuffer = file.arrayBuffer;
              const lowerName = file.name.toLowerCase();

              // Crop to uniform aspect ratio if selected
              if (imageCropRatio !== 'none') {
                try {
                  const blob = new Blob([arrayBuffer], { type: file.type || 'image/jpeg' });
                  const dataUrl = await new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = (e) => resolve(e.target.result);
                    reader.onerror = reject;
                    reader.readAsDataURL(blob);
                  });

                  const img = await new Promise((resolve, reject) => {
                    const image = new Image();
                    image.onload = () => resolve(image);
                    image.onerror = reject;
                    image.src = dataUrl;
                  });

                  let targetRatio = 1;
                  if (imageCropRatio === '1:1') targetRatio = 1;
                  else if (imageCropRatio === '4:3') targetRatio = 4 / 3;
                  else if (imageCropRatio === '16:9') targetRatio = 16 / 9;
                  else if (imageCropRatio === '3:2') targetRatio = 3 / 2;

                  const originalRatio = img.width / img.height;
                  let cropX = 0, cropY = 0, cropWidth = img.width, cropHeight = img.height;

                  if (originalRatio > targetRatio) {
                    cropHeight = img.height;
                    cropWidth = img.height * targetRatio;
                    cropX = (img.width - cropWidth) / 2;
                  } else if (originalRatio < targetRatio) {
                    cropWidth = img.width;
                    cropHeight = img.width / targetRatio;
                    cropY = (img.height - cropHeight) / 2;
                  }

                  const canvas = document.createElement('canvas');
                  canvas.width = cropWidth;
                  canvas.height = cropHeight;
                  const ctx = canvas.getContext('2d');
                  ctx.drawImage(img, cropX, cropY, cropWidth, cropHeight, 0, 0, cropWidth, cropHeight);

                  const jpegDataUrl = canvas.toDataURL('image/jpeg', 0.90);
                  const jpegBuffer = dataURLToArrayBuffer(jpegDataUrl);
                  pdfImage = await pdfDoc.embedJpg(jpegBuffer);
                } catch (cropErr) {
                  console.warn(`Cropping failed for ${file.name}, falling back to uncropped:`, cropErr);
                }
              }

              // Direct / standard embedding if not cropped or crop failed
              if (!pdfImage) {
                try {
                  if (lowerName.endsWith('.png')) {
                    pdfImage = await pdfDoc.embedPng(arrayBuffer);
                  } else if (lowerName.endsWith('.jpg') || lowerName.endsWith('.jpeg')) {
                    pdfImage = await pdfDoc.embedJpg(arrayBuffer);
                  } else {
                    // Fallback for non-standard browser images (WEBP, SVG, HEIC etc.) using loaded ArrayBuffer to create safe memory Blob
                    const blob = new Blob([arrayBuffer], { type: file.type });
                    const dataUrl = await new Promise((resolve, reject) => {
                      const reader = new FileReader();
                      reader.onload = (e) => resolve(e.target.result);
                      reader.onerror = reject;
                      reader.readAsDataURL(blob);
                    });

                    const img = await new Promise((resolve, reject) => {
                      const image = new Image();
                      image.onload = () => resolve(image);
                      image.onerror = reject;
                      image.src = dataUrl;
                    });

                    const canvas = document.createElement('canvas');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);

                    const jpegDataUrl = canvas.toDataURL('image/jpeg', 0.85);
                    const jpegBuffer = dataURLToArrayBuffer(jpegDataUrl);
                    pdfImage = await pdfDoc.embedJpg(jpegBuffer);
                  }
                } catch (embedError) {
                  console.warn(`Direct embedding failed for ${file.name}, trying canvas conversion fallback:`, embedError);
                  // Standard canvas fallback for any image parse errors using safe memory Blob
                  const blob = new Blob([arrayBuffer], { type: file.type });
                  const dataUrl = await new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = (e) => resolve(e.target.result);
                    reader.onerror = reject;
                    reader.readAsDataURL(blob);
                  });

                  const img = await new Promise((resolve, reject) => {
                    const image = new Image();
                    image.onload = () => resolve(image);
                    image.onerror = reject;
                    image.src = dataUrl;
                  });

                  const canvas = document.createElement('canvas');
                  canvas.width = img.width;
                  canvas.height = img.height;
                  const ctx = canvas.getContext('2d');
                  ctx.drawImage(img, 0, 0);

                  const jpegDataUrl = canvas.toDataURL('image/jpeg', 0.85);
                  const jpegBuffer = dataURLToArrayBuffer(jpegDataUrl);
                  pdfImage = await pdfDoc.embedJpg(jpegBuffer);
                }
              }

              // Default A4 size
              let pageWidth = 595.28;
              let pageHeight = 841.89;

              if (imageLayout === 'fit') {
                pageWidth = pdfImage.width;
                pageHeight = pdfImage.height;
              }

              const page = pdfDoc.addPage([pageWidth, pageHeight]);

              if (imageLayout === 'fit') {
                page.drawImage(pdfImage, {
                  x: 0,
                  y: 0,
                  width: pageWidth,
                  height: pageHeight,
                });
              } else {
                const margin = 40;
                const maxWidth = pageWidth - margin * 2;
                const maxHeight = pageHeight - margin * 2;
                const ratio = Math.min(maxWidth / pdfImage.width, maxHeight / pdfImage.height);
                const width = pdfImage.width * ratio;
                const height = pdfImage.height * ratio;
                const x = (pageWidth - width) / 2;
                const y = (pageHeight - height) / 2;

                page.drawImage(pdfImage, {
                  x,
                  y,
                  width,
                  height,
                });
              }
            }

            // Secure with simple warning if password entered on pure client-side
            if (imagePassword) {
              console.warn("Client-side direct password protection is simulated in modern browsers. Applying metadata tag.");
              pdfDoc.setSubject(`Password restriction requested: ${imagePassword}`);
            }

            const pdfBytes = await pdfDoc.save();
            const blob = new Blob([pdfBytes], { type: 'application/pdf' });

            updatePreview(blob, 'images_converted.pdf');
            setImagesSuccess(true);
            // Clean up old preview object URLs upon successful conversion
            imageFiles.forEach(f => {
              if (f.previewUrl) URL.revokeObjectURL(f.previewUrl);
            });
            setImageFiles([]);
            setImagePassword('');
          } catch (err) {
            console.error('Image Conversion Error:', err);
            setImagesError(err.message || 'An error occurred during client-side PDF generation.');
          } finally {
            setIsImagesLoading(false);
          }
        };

        const handleDocSubmit = async () => {
          if (!docFile) {
            setDocError('Please upload a document first.');
            return;
          }
          setIsDocLoading(true);
          setDocError('');
          setDocSuccess(false);

          try {
            let contentText = '';
            const fileType = docFile.name.split('.').pop().toLowerCase();

            if (fileType === 'docx') {
              if (!window.mammoth) {
                throw new Error('Word Document parsing library is still loading. Please wait a moment.');
              }
              const arrayBuffer = docFile.arrayBuffer;
              const result = await window.mammoth.extractRawText({ arrayBuffer: arrayBuffer });
              contentText = result.value;
            } else if (['txt', 'md', 'csv', 'html', 'json'].includes(fileType)) {
              contentText = docFile.textContent;

              if (fileType === 'html') {
                // Strip simple html tags
                contentText = contentText.replace(/<[^>]*>/g, '');
              }
            } else {
              throw new Error(`Unsupported format: .${fileType}. Please use a .docx, .txt, .md, or .csv file.`);
            }

            if (!contentText.trim()) {
              throw new Error('The uploaded file is empty or could not be parsed.');
            }

            if (!window.PDFLib) {
              throw new Error('PDF generator library is not loaded yet.');
            }

            const { PDFDocument, StandardFonts, rgb } = window.PDFLib;
            const pdfDoc = await PDFDocument.create();
            const font = await pdfDoc.embedFont(StandardFonts.Helvetica);
            const boldFont = await pdfDoc.embedFont(StandardFonts.HelveticaBold);

            const width = 595.28; // A4
            const height = 841.89;
            const margin = 50;
            const contentWidth = width - margin * 2;
            const fontSizeNum = 10;
            const lineHeight = fontSizeNum * 1.4;

            // Simple line wrapping
            const wrapText = (text, maxWidth, fontInstance, fontSize) => {
              const paragraphs = text.split('\n');
              const lines = [];
              for (const paragraph of paragraphs) {
                if (!paragraph.trim()) {
                  lines.push('');
                  continue;
                }
                const words = paragraph.split(/\s+/);
                let currentLine = '';
                for (const word of words) {
                  const testLine = currentLine ? `${currentLine} ${word}` : word;
                  const textWidth = fontInstance.widthOfTextAtSize(testLine, fontSize);
                  if (textWidth > maxWidth && currentLine) {
                    lines.push(currentLine);
                    currentLine = word;
                  } else {
                    currentLine = testLine;
                  }
                }
                if (currentLine) {
                  lines.push(currentLine);
                }
              }
              return lines;
            };

            const wrappedLines = wrapText(contentText, contentWidth, font, fontSizeNum);

            let page = pdfDoc.addPage([width, height]);
            let currentY = height - margin;

            // Header title
            const actualTitle = docTitle || docFile.name.substring(0, docFile.name.lastIndexOf('.')) || 'Document';
            page.drawText(actualTitle, {
              x: margin,
              y: currentY,
              size: fontSizeNum + 6,
              font: boldFont,
              color: rgb(0.1, 0.1, 0.1),
            });
            currentY -= (fontSizeNum + 6) * 1.8;

            for (const line of wrappedLines) {
              if (currentY < margin + lineHeight) {
                page = pdfDoc.addPage([width, height]);
                currentY = height - margin;
              }

              if (line) {
                // Remove non-standard unicode characters that PDFLib Helvetica doesn't support
                const cleanLine = line.replace(/[^\x00-\x7F]/g, " ");
                page.drawText(cleanLine, {
                  x: margin,
                  y: currentY,
                  size: fontSizeNum,
                  font: font,
                  color: rgb(0.2, 0.2, 0.2),
                });
              }
              currentY -= lineHeight;
            }

            const pdfBytes = await pdfDoc.save();
            const blob = new Blob([pdfBytes], { type: 'application/pdf' });

            updatePreview(blob, `${actualTitle}.pdf`);
            setDocSuccess(true);
            setDocFile(null);
            setDocTitle('');
            setDocPassword('');
          } catch (err) {
            console.error('Document Conversion Error:', err);
            setDocError(err.message || 'An error occurred during conversion.');
          } finally {
            setIsDocLoading(false);
          }
        };

        const handleWriteSubmit = async () => {
          if (!writeText.trim()) {
            setWriteError('Please write some content first.');
            return;
          }
          setIsWriteLoading(true);
          setWriteError('');
          setWriteSuccess(false);

          try {
            if (!window.PDFLib) {
              throw new Error('PDF generator library is not loaded yet.');
            }

            const { PDFDocument, StandardFonts, rgb } = window.PDFLib;
            const pdfDoc = await PDFDocument.create();
            const font = await pdfDoc.embedFont(StandardFonts.Helvetica);
            const boldFont = await pdfDoc.embedFont(StandardFonts.HelveticaBold);

            const sizes = {
              'A4': [595.28, 841.89],
              'Letter': [612.00, 792.00]
            };
            const [width, height] = sizes[writePageSize] || sizes['A4'];
            
            const margin = 50;
            const contentWidth = width - margin * 2;
            const fontSizeNum = parseInt(writeFontSize) || 11;
            const lineHeight = fontSizeNum * 1.4;

            const wrapText = (text, maxWidth, fontInstance, fontSize) => {
              const paragraphs = text.split('\n');
              const lines = [];
              for (const paragraph of paragraphs) {
                if (!paragraph.trim()) {
                  lines.push('');
                  continue;
                }
                const words = paragraph.split(/\s+/);
                let currentLine = '';
                for (const word of words) {
                  const testLine = currentLine ? `${currentLine} ${word}` : word;
                  const textWidth = fontInstance.widthOfTextAtSize(testLine, fontSize);
                  if (textWidth > maxWidth && currentLine) {
                    lines.push(currentLine);
                    currentLine = word;
                  } else {
                    currentLine = testLine;
                  }
                }
                if (currentLine) {
                  lines.push(currentLine);
                }
              }
              return lines;
            };

            const wrappedLines = wrapText(writeText, contentWidth, font, fontSizeNum);

            let page = pdfDoc.addPage([width, height]);
            let currentY = height - margin;

            if (writeTitle) {
              page.drawText(writeTitle, {
                x: margin,
                y: currentY,
                size: fontSizeNum + 6,
                font: boldFont,
                color: rgb(0.1, 0.1, 0.1),
              });
              currentY -= (fontSizeNum + 6) * 1.8;
            }

            for (const line of wrappedLines) {
              if (currentY < margin + lineHeight) {
                page = pdfDoc.addPage([width, height]);
                currentY = height - margin;
              }

              if (line) {
                const cleanLine = line.replace(/[^\x00-\x7F]/g, " ");
                page.drawText(cleanLine, {
                  x: margin,
                  y: currentY,
                  size: fontSizeNum,
                  font: font,
                  color: rgb(0.2, 0.2, 0.2),
                });
              }
              currentY -= lineHeight;
            }

            const pdfBytes = await pdfDoc.save();
            const blob = new Blob([pdfBytes], { type: 'application/pdf' });
            
            updatePreview(blob, `${writeTitle || 'document'}.pdf`);
            setWriteSuccess(true);
            setWriteText('');
            setWriteTitle('');
            setWritePassword('');
          } catch (err) {
            console.error('PDF Writing Error:', err);
            setWriteError(err.message || 'An error occurred during PDF generation.');
          } finally {
            setIsWriteLoading(false);
          }
        };

        const handleSecSubmit = async () => {
          if (!secFile) {
            setSecError('Please upload a PDF file.');
            return;
          }
          if (secAction === 'add' && !secPassword) {
            setSecError('Please provide a password to secure the file.');
            return;
          }
          if (secAction === 'change' && (!secPassword || !secNewPassword)) {
            setSecError('Please provide both current and new passwords.');
            return;
          }
          if (secAction === 'delete' && !secPassword) {
            setSecError('Please provide the current password to decrypt the file.');
            return;
          }

          setIsSecLoading(true);
          setSecError('');
          setSecSuccess(false);

          const formData = new FormData();
          // Create Blob from preloaded arrayBuffer to avoid permission issues when browser serializes FormData!
          const blob = new Blob([secFile.arrayBuffer], { type: secFile.type || 'application/pdf' });
          formData.append('pdf', blob, secFile.name);
          formData.append('action', secAction);
          formData.append('password', secPassword);
          if (secAction === 'change') {
            formData.append('newPassword', secNewPassword);
          }

          try {
            const response = await fetch('/api/pdf-security', {
              method: 'POST',
              body: formData,
            });

            if (!response.ok) {
              const errData = await response.json();
              throw new Error(errData.error || 'Failed to process PDF security.');
            }

            const resultBlob = await response.blob();
            updatePreview(resultBlob, `${secFile.name.replace('.pdf', '')}_secured.pdf`);
            setSecSuccess(true);
            setSecFile(null);
            setSecPassword('');
            setSecNewPassword('');
          } catch (err) {
            setSecError(err.message || 'An error occurred.');
          } finally {
            setIsSecLoading(false);
          }
        };

        return (
          <div id="app-root" className="min-h-screen flex flex-col bg-neutral-50 text-neutral-800 font-sans antialiased">
            {/* Top Navigation Bar */}
            <header id="app-header" className="sticky top-0 z-40 w-full bg-white border-b border-neutral-200/80 shadow-xs">
              <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
                <div className="flex items-center space-x-3.5">
                  <div className="bg-indigo-600 text-white p-2.5 rounded-xl shadow-md shadow-indigo-100 flex items-center justify-center">
                    <Icons.FileText />
                  </div>
                  <div>
                    <h1 id="app-title" className="font-sans font-semibold text-lg tracking-tight text-neutral-900 leading-none">
                      PDF Maker & Security Tool
                    </h1>
                    <p className="text-[11px] text-neutral-400 font-mono mt-1.5 uppercase tracking-wider">v1.4 • Native WebView Optimized</p>
                  </div>
                </div>
                <div className="flex items-center space-x-4">
                  <span className="hidden sm:inline-flex items-center px-2.5 py-1 rounded-full text-xs font-semibold bg-green-50 text-green-700 border border-green-200">
                    <span className="w-1.5 h-1.5 mr-1.5 rounded-full bg-green-500 animate-pulse"></span>
                    Operational Cloud
                  </span>
                </div>
              </div>
            </header>

            {/* Main Workspace Grid */}
            <main className="flex-1 max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-8">
              <div className="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
                
                {/* Navigation Menu (Left) */}
                <nav id="nav-container" className={`${previewUrl ? 'lg:col-span-2' : 'lg:col-span-3'} space-y-2 bg-white border border-neutral-200/80 rounded-2xl p-4 shadow-sm transition-all`}>
                  <div className="text-[11px] font-mono font-semibold text-neutral-400 tracking-widest uppercase px-3 mb-3">
                    Tools & Converters
                  </div>
                  
                  <button
                    id="tab-images"
                    type="button"
                    onClick={() => { setActiveTab('images'); }}
                    className={`w-full flex items-center space-x-3 px-3.5 py-3 rounded-xl transition-all cursor-pointer ${
                      activeTab === 'images'
                        ? 'bg-indigo-50 border-l-4 border-indigo-600 text-indigo-700 shadow-xs font-medium'
                        : 'text-neutral-600 hover:bg-neutral-50 hover:text-neutral-900'
                    }`}
                  >
                    <span className={activeTab === 'images' ? 'text-indigo-600' : 'text-neutral-400'}><Icons.ImageIcon /></span>
                    <span className="text-sm">Images to PDF</span>
                  </button>

                  <button
                    id="tab-documents"
                    type="button"
                    onClick={() => { setActiveTab('documents'); }}
                    className={`w-full flex items-center space-x-3 px-3.5 py-3 rounded-xl transition-all cursor-pointer ${
                      activeTab === 'documents'
                        ? 'bg-indigo-50 border-l-4 border-indigo-600 text-indigo-700 shadow-xs font-medium'
                        : 'text-neutral-600 hover:bg-neutral-50 hover:text-neutral-900'
                    }`}
                  >
                    <span className={activeTab === 'documents' ? 'text-indigo-600' : 'text-neutral-400'}><Icons.File /></span>
                    <span className="text-sm">Document to PDF</span>
                  </button>

                  <button
                    id="tab-write"
                    type="button"
                    onClick={() => { setActiveTab('write'); }}
                    className={`w-full flex items-center space-x-3 px-3.5 py-3 rounded-xl transition-all cursor-pointer ${
                      activeTab === 'write'
                        ? 'bg-indigo-50 border-l-4 border-indigo-600 text-indigo-700 shadow-xs font-medium'
                        : 'text-neutral-600 hover:bg-neutral-50 hover:text-neutral-900'
                    }`}
                  >
                    <span className={activeTab === 'write' ? 'text-indigo-600' : 'text-neutral-400'}><Icons.FileText /></span>
                    <span className="text-sm">Write Text to PDF</span>
                  </button>

                  <div className="text-[11px] font-mono font-semibold text-neutral-400 tracking-widest uppercase px-3 pt-6 mb-3">
                    Security & Passwords
                  </div>

                  <button
                    id="tab-security"
                    type="button"
                    onClick={() => { setActiveTab('security'); }}
                    className={`w-full flex items-center space-x-3 px-3.5 py-3 rounded-xl transition-all cursor-pointer ${
                      activeTab === 'security'
                        ? 'bg-indigo-50 border-l-4 border-indigo-600 text-indigo-700 shadow-xs font-medium'
                        : 'text-neutral-600 hover:bg-neutral-50 hover:text-neutral-900'
                    }`}
                  >
                    <span className={activeTab === 'security' ? 'text-indigo-600' : 'text-neutral-400'}><Icons.Lock /></span>
                    <span className="text-sm">PDF Password Manager</span>
                  </button>
                </nav>

                {/* Central Workspace Panel (Right) */}
                <div className={`${previewUrl ? 'lg:col-span-5' : 'lg:col-span-9'} bg-white border border-neutral-200/90 rounded-2xl shadow-sm overflow-hidden p-6 sm:p-8 transition-all`}>
                  
                  {/* TAB 1: IMAGES TO PDF */}
                  {activeTab === 'images' && (
                    <div className="space-y-6 animate-fade-in">
                      <div>
                        <h2 className="text-xl font-semibold text-neutral-900">Images to PDF Converter</h2>
                        <p className="text-sm text-neutral-500 mt-1">
                          Upload multiple images of any extension (PNG, JPEG, WebP, SVG, BMP, TIFF, GIF) and order them sequentially to output a pristine, combined PDF.
                        </p>
                      </div>

                      {/* Drop Zone */}
                      <div
                        id="images-dropzone"
                        onDragOver={handleDragOver}
                        onDragLeave={handleDragLeave}
                        onDrop={handleImageDrop}
                        className={`relative border-2 border-dashed rounded-xl p-8 flex flex-col items-center justify-center text-center transition-all border-neutral-300 hover:border-indigo-400 hover:bg-neutral-50/50 ${
                          isDragOver ? 'border-indigo-500 bg-indigo-50/50 scale-[0.99]' : ''
                        }`}
                      >
                        {/* Direct transparent overlay covering the entire dropzone to bypass programmatic .click() WebView blocks */}
                        <input
                          id="image-input"
                          type="file"
                          multiple
                          accept="image/*"
                          className="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10"
                          onChange={handleImageSelect}
                        />
                        <div className="text-neutral-400 mb-3"><Icons.UploadCloud /></div>
                        <p className="text-sm font-medium text-neutral-700">
                          Drag & drop your images here, or <span className="text-indigo-600 hover:underline">browse files</span>
                        </p>
                        <p className="text-xs text-neutral-400 mt-1.5 font-mono">Accepts PNG, JPG, WebP, BMP, TIFF, GIF, SVG</p>
                      </div>

                      {/* Image List with Order controls */}
                      {imageFiles.length > 0 && (
                        <div className="space-y-3">
                          <div className="flex items-center justify-between">
                            <span className="text-xs font-mono font-semibold text-neutral-400 uppercase tracking-wider">
                              Arranged Images ({imageFiles.length})
                            </span>
                            <button

                                }`}
                              >
                                <Icons.RefreshCw className="w-4 h-4" />
                                <span className="text-xs">Change Password</span>
                              </button>
                              
                              <button
                                id="action-delete"
                                type="button"
                                onClick={() => { setSecAction('delete'); setSecError(''); }}
                                className={`py-3 px-4 border rounded-xl flex flex-col items-center justify-center text-center space-y-1.5 transition-all cursor-pointer ${
                                  secAction === 'delete'
                                    ? 'border-indigo-600 bg-indigo-50/30 text-indigo-700 ring-2 ring-indigo-500/20 font-medium'
                                    : 'border-neutral-200 bg-white hover:bg-neutral-50 text-neutral-600'
                                }`}
                              >
                                <Icons.Unlock />
                                <span className="text-xs">Delete Password</span>
                              </button>
                            </div>
                          </div>

                          {/* Password input fields */}
                          <div className="grid grid-cols-1 md:grid-cols-2 gap-6 pt-5 border-t border-neutral-100">
                            <div className="space-y-2">
                              <label className="block text-xs font-semibold text-neutral-500 uppercase tracking-wider">
                                {secAction === 'add' ? 'Desired Password' : 'Current Password'}
                              </label>
                              <div className="relative">
                                <span className="absolute left-3 top-2.5 text-neutral-400"><Icons.KeyRound /></span>
                                <input
                                  id="sec-password"
                                  type="password"
                                  value={secPassword}
                                  onChange={(e) => setSecPassword(e.target.value)}
                                  placeholder="••••••••"
                                  className="w-full bg-white border border-neutral-300 rounded-lg pl-10 pr-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500"
                                />
                              </div>
                            </div>

                            {secAction === 'change' && (
                              <div className="space-y-2 animate-fade-in">
                                <label className="block text-xs font-semibold text-neutral-500 uppercase tracking-wider">New Password</label>
                                <div className="relative">
                                  <span className="absolute left-3 top-2.5 text-neutral-400"><Icons.KeyRound /></span>
                                  <input
                                    id="sec-new-password"
                                    type="password"
                                    value={secNewPassword}
                                    onChange={(e) => setSecNewPassword(e.target.value)}
                                    placeholder="••••••••"
                                    className="w-full bg-white border border-neutral-300 rounded-lg pl-10 pr-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500"
                                  />
                                </div>
                              </div>
                            )}
                          </div>

                          {/* Notifications */}
                          {secError && (
                            <div className="bg-red-50 border border-red-200 text-red-800 rounded-xl p-4 flex items-start space-x-3">
                              <span className="shrink-0 mt-0.5"><Icons.AlertCircle /></span>
                              <span className="text-sm font-medium">{secError}</span>
                            </div>
                          )}

                          {secSuccess && (
                            <div className="bg-green-50 border border-green-200 text-green-800 rounded-xl p-4 flex items-start space-x-3">
                              <span className="shrink-0 mt-0.5"><Icons.CheckCircle /></span>
                              <span className="text-sm font-medium">Success! The security configuration has been applied. Preview it on the right or click download.</span>
                            </div>
                          )}

                          {/* Convert Action */}
                          <div className="flex justify-end pt-5 border-t border-neutral-100">
                            <button
                              id="convert-sec-btn"
                              type="button"
                              onClick={handleSecSubmit}
                              disabled={isSecLoading || !secFile}
                              className={`px-5 py-2.5 rounded-xl font-medium text-sm text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 flex items-center space-x-2.5 transition-all cursor-pointer ${
                                isSecLoading || !secFile ? 'opacity-40 cursor-not-allowed' : 'shadow-md shadow-indigo-100'
                              }`}
                            >
                              {isSecLoading ? (
                                <>
                                  <Icons.RefreshCw className="w-4 h-4 animate-spin" />
                                  <span>Updating Permissions...</span>
                                </>
                              ) : (
                                <>
                                  <Icons.Lock />
                                  <span>Apply Lock Settings</span>
                                </>
                              )}
                            </button>
                          </div>
                        </>
                      )}
                    </div>
                  )}

                </div>

                {/* Right PDF Preview Panel (Only active when preview file exists) */}
                {previewUrl && (
                  <div ref={previewRef} className={`${previewUrl ? 'lg:col-span-5' : 'lg:col-span-1'} bg-white border border-neutral-200/90 rounded-2xl p-6 shadow-sm space-y-5 animate-fade-in sticky top-20`}>
                    <div className="flex items-center justify-between border-b border-neutral-100 pb-3">
                      <div>
                        <h3 className="font-semibold text-neutral-900 text-sm">Output Document Preview</h3>
                        <p className="text-[11px] text-neutral-400 font-mono truncate max-w-[180px]">{previewFilename}</p>
                      </div>
                      <button
                        type="button"
                        onClick={clearPreview}
                        className="text-neutral-400 hover:text-neutral-600 p-1 bg-neutral-50 hover:bg-neutral-100 border border-neutral-200 rounded-lg transition-all cursor-pointer"
                        title="Clear Preview"
                      >
                        <Icons.X />
                      </button>
                    </div>

                    {/* PDF Preview Renderer using PDF.js or secure iframe depending on environment */}
                    <div className="relative border border-neutral-200/80 rounded-xl overflow-hidden bg-neutral-100/50 flex-1 min-h-[450px]">
                      {isServerAvailable ? (
                        <iframe
                          src={previewUrl}
                          className="w-full h-[550px] border-none"
                          title="PDF Viewer"
                        />
                      ) : (
                        <PdfViewer blob={previewBlob} />
                      )}
                    </div>

                    {/* HopWeb / Android WebView Compatibility Alert & Instructions */}
                    <div className="bg-amber-50/75 rounded-xl p-4 text-xs text-amber-900 border border-amber-200 leading-relaxed space-y-2">
                      <div className="flex items-center space-x-2">
                        <span className="text-base">📱</span>
                        <span className="font-semibold text-amber-950">Mobile & HopWeb Notice</span>
                      </div>
                      <p>
                        Android local runners (like <b>HopWeb</b>) run inside WebViews which block standard file downloads. 
                        If the <b>Download</b> button does not respond, please tap <b>Share / Save PDF</b> to save the file to your device or Google Drive, or use <b>Open in New Tab</b>.
                      </p>
                    </div>

                    {/* Actions */}
                    <div className="flex flex-col gap-2 pt-3 border-t border-neutral-100">
                      <div className="flex flex-col sm:flex-row gap-2">
                        <a
                          href={previewUrl}
                          target="_blank"
                          rel="noopener noreferrer"
                          className="flex-1 px-2.5 py-1 rounded-md border border-neutral-300 hover:bg-neutral-50 text-neutral-600 font-medium text-[11px] flex items-center justify-center space-x-1 transition-all cursor-pointer shadow-xs shrink-0"
                        >
                          <Icons.ExternalLink className="w-3.5 h-3.5 shrink-0" />
                          <span>Open in New Tab</span>
                        </a>

                        <button
                          type="button"
                          onClick={async () => {
                            try {
                              if (!previewBlob) {
                                return;
                              }
                              
                              const file = new File([previewBlob], previewFilename, { type: 'application/pdf' });
                              
                              if (navigator.share) {
                                // Try file sharing first if supported
                                if (navigator.canShare && navigator.canShare({ files: [file] })) {
                                  await navigator.share({
                                    files: [file],
                                    title: previewFilename,
                                    text: 'Here is your compiled PDF document',
                                  });
                                } else {
                                  // Fallback to text/url sharing
                                  await navigator.share({
                                    title: previewFilename,
                                    text: 'Here is your compiled PDF document',
                                    url: window.location.href
                                  });
                                }
                              } else {
                                alert("Sharing is not supported by this browser. Try 'Open in New Tab' or 'Download PDF' instead.");
                              }
                            } catch (shareErr) {
                              const errStr = String(shareErr);
                              const isCancel = 
                                (shareErr && shareErr.name === 'AbortError') || 
                                errStr.toLowerCase().includes('cancel') || 
                                errStr.toLowerCase().includes('abort');
                              
                              if (isCancel) {
                                console.log('Share action was cancelled by the user.');
                              } else {
                                console.warn('Share action did not complete:', shareErr);
                                alert("Sharing failed. Please try 'Open in New Tab' or 'Download PDF' instead.");
                              }
                            }
                          }}
                          className="flex-1 px-2.5 py-1 rounded-md border border-indigo-200 bg-indigo-50 hover:bg-indigo-100 text-indigo-700 font-medium text-[11px] flex items-center justify-center space-x-1 transition-all cursor-pointer shadow-xs shrink-0"
                        >
                          <Icons.Share className="w-3.5 h-3.5 shrink-0" />
                          <span>Share / Save PDF</span>
                        </button>
                      </div>

                      <button
                        type="button"
                        onClick={() => downloadBlob(previewBlob, previewFilename)}
                        className="w-full px-3 py-1.5 rounded-md font-medium text-[11px] text-white bg-indigo-600 hover:bg-indigo-700 shadow-sm flex items-center justify-center space-x-1.5 transition-all cursor-pointer shrink-0"
                      >
                        <Icons.FileDown className="w-3.5 h-3.5 shrink-0" />
                        <span>Download PDF File</span>
                      </button>
                    </div>
                  </div>
                )}

              </div>
            </main>

            {/* Footer */}
            <footer className="mt-auto py-6 border-t border-neutral-200/60 bg-white">
              <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col sm:flex-row items-center justify-between text-xs text-neutral-400 space-y-3 sm:space-y-0 font-mono">
                <span>PDF Maker Engine • Native qpdf Support</span>
                <span>Active Server Session Verified</span>
              </div>
            </footer>
          </div>
        );
      }

      // Render React App
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  </body>
</html>
